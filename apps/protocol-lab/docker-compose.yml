version: '3.8'

# Lightning Network is now provided by the root docker-compose.yml
# Start with: docker compose --profile lightning up -d (from repo root)
# LND REST: https://localhost:6108, gRPC: localhost:6109

services:
  # ==========================================================================
  # App services (for Docker-based deployment, not needed for local dev)
  # ==========================================================================

  protocol-api:
    build:
      context: ./apps/protocol-api
      dockerfile: Dockerfile
    ports:
      - "${PROTOCOL_LAB_PROTOCOL_API_PORT:-5402}:${PROTOCOL_LAB_PROTOCOL_API_PORT:-5402}"
    environment:
      - NODE_ENV=development
      - PROTOCOL_LAB_PROTOCOL_API_PORT=${PROTOCOL_LAB_PROTOCOL_API_PORT:-5402}
      - PROTOCOL_LAB_RESEARCH_HUB_PORT=${PROTOCOL_LAB_RESEARCH_HUB_PORT:-5403}
      - PROTOCOL_LAB_MARKET_PULSE_PORT=${PROTOCOL_LAB_MARKET_PULSE_PORT:-5404}
      - PROTOCOL_LAB_CONTENT_FORGE_PORT=${PROTOCOL_LAB_CONTENT_FORGE_PORT:-5405}
    depends_on:
      - research-hub
      - market-pulse

  research-hub:
    build:
      context: ./apps/research-hub
      dockerfile: Dockerfile
    ports:
      - "${PROTOCOL_LAB_RESEARCH_HUB_PORT:-5403}:${PROTOCOL_LAB_RESEARCH_HUB_PORT:-5403}"
    environment:
      - NODE_ENV=development
      - PROTOCOL_LAB_RESEARCH_HUB_PORT=${PROTOCOL_LAB_RESEARCH_HUB_PORT:-5403}

  market-pulse:
    build:
      context: ./apps/market-pulse
      dockerfile: Dockerfile
    ports:
      - "${PROTOCOL_LAB_MARKET_PULSE_PORT:-5404}:${PROTOCOL_LAB_MARKET_PULSE_PORT:-5404}"
    environment:
      - NODE_ENV=development
      - PROTOCOL_LAB_MARKET_PULSE_PORT=${PROTOCOL_LAB_MARKET_PULSE_PORT:-5404}

  agent-consumer:
    build:
      context: ./apps/agent-consumer
      dockerfile: Dockerfile
    ports:
      - "${PROTOCOL_LAB_AGENT_CONSUMER_PORT:-5406}:${PROTOCOL_LAB_AGENT_CONSUMER_PORT:-5406}"
    environment:
      - NODE_ENV=development
      - PROTOCOL_LAB_AGENT_CONSUMER_PORT=${PROTOCOL_LAB_AGENT_CONSUMER_PORT:-5406}
      - PROTOCOL_LAB_RESEARCH_HUB_PORT=${PROTOCOL_LAB_RESEARCH_HUB_PORT:-5403}
    depends_on:
      - research-hub

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${PROTOCOL_LAB_FRONTEND_PORT:-5400}:80"
    depends_on:
      - protocol-api

