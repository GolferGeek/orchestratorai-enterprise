version: '3.8'

# Lightning Network is now provided by the root docker-compose.yml
# Start with: docker compose --profile lightning up -d (from repo root)
# LND REST: https://localhost:6108, gRPC: localhost:6109

services:
  # ==========================================================================
  # App services (for Docker-based deployment, not needed for local dev)
  # ==========================================================================

  protocol-api:
    build:
      context: ./apps/protocol-api
      dockerfile: Dockerfile
    ports:
      - "6402:6402"
    environment:
      - NODE_ENV=development
    depends_on:
      - research-hub
      - market-pulse

  research-hub:
    build:
      context: ./apps/research-hub
      dockerfile: Dockerfile
    ports:
      - "6403:6403"
    environment:
      - NODE_ENV=development

  market-pulse:
    build:
      context: ./apps/market-pulse
      dockerfile: Dockerfile
    ports:
      - "6404:6404"
    environment:
      - NODE_ENV=development

  agent-consumer:
    build:
      context: ./apps/agent-consumer
      dockerfile: Dockerfile
    ports:
      - "6406:6406"
    environment:
      - NODE_ENV=development
    depends_on:
      - research-hub

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "6400:80"
    depends_on:
      - protocol-api

