# OrchestratorAI Enterprise — All 8 products + Lightning Network
# Usage:
#   docker compose --env-file .env --env-file .env.secrets up        # local
#   docker compose --env-file .env.azure --env-file .env.secrets.azure up  # Azure
#   docker compose --env-file .env.gcp --env-file .env.secrets.gcp up      # GCP
#
# Lightning Network (regtest):
#   docker compose up -d bitcoind lnd lnd-init bitcoind-miner
#   ./scripts/lnd-env.sh   # exports macaroon + URL to .env

services:
  # ==========================================================================
  # Lightning Network (regtest) — bitcoind + LND + init + miner
  # Start with: docker compose up -d bitcoind lnd lnd-init bitcoind-miner
  # ==========================================================================

  bitcoind:
    image: lncm/bitcoind:v27.0
    restart: unless-stopped
    profiles: ["lightning"]
    command:
      - -regtest
      - -server
      - -rpcuser=dev
      - -rpcpassword=dev
      - -rpcallowip=0.0.0.0/0
      - -rpcbind=0.0.0.0
      - -zmqpubrawblock=tcp://0.0.0.0:28332
      - -zmqpubrawtx=tcp://0.0.0.0:28333
      - -fallbackfee=0.00001
      - -txindex=1
    volumes:
      - bitcoind-data:/root/.bitcoin

  lnd:
    image: lightninglabs/lnd:v0.18.4-beta
    restart: unless-stopped
    profiles: ["lightning"]
    depends_on:
      - bitcoind
    command:
      - --noseedbackup
      - --bitcoin.active
      - --bitcoin.regtest
      - --bitcoin.node=bitcoind
      - --bitcoind.rpchost=bitcoind
      - --bitcoind.rpcuser=dev
      - --bitcoind.rpcpass=dev
      - --bitcoind.zmqpubrawblock=tcp://bitcoind:28332
      - --bitcoind.zmqpubrawtx=tcp://bitcoind:28333
      - --restlisten=0.0.0.0:8080
      - --rpclisten=0.0.0.0:10009
      - --tlsextradomain=lnd
      - --tlsextraip=0.0.0.0
    ports:
      - "6108:8080"   # LND REST API
      - "6109:10009"  # LND gRPC
    volumes:
      - lnd-data:/root/.lnd
      - shared-data:/shared

  lnd-init:
    image: lightninglabs/lnd:v0.18.4-beta
    profiles: ["lightning"]
    depends_on:
      - lnd
    entrypoint: ["/bin/sh", "/scripts/lnd-init.sh"]
    volumes:
      - lnd-data:/root/.lnd:ro
      - shared-data:/shared
      - ./scripts/lnd-init.sh:/scripts/lnd-init.sh:ro

  bitcoind-miner:
    image: lncm/bitcoind:v27.0
    profiles: ["lightning"]
    depends_on:
      - bitcoind
      - lnd-init
    entrypoint: ["/bin/sh", "/scripts/bitcoind-miner.sh"]
    volumes:
      - shared-data:/shared
      - ./scripts/bitcoind-miner.sh:/scripts/bitcoind-miner.sh:ro

  # ==========================================================================
  # Application Products
  # ==========================================================================

  # --- Command (web only) ---
  command-web:
    build: ./apps/command/web
    ports: ["${COMMAND_WEB_PORT}:${COMMAND_WEB_PORT}"]
    environment:
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Auth (API only) ---
  auth-api:
    build: ./apps/auth/api
    ports: ["${AUTH_API_PORT}:${AUTH_API_PORT}"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  # --- Admin (web only) ---
  admin-web:
    build: ./apps/admin/web
    ports: ["${ADMIN_WEB_PORT}:${ADMIN_WEB_PORT}"]
    environment:
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Forge ---
  forge-api:
    build: ./apps/forge/api
    ports: ["${FORGE_API_PORT}:${FORGE_API_PORT}"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_API_URL=${AUTH_API_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  forge-web:
    build: ./apps/forge/web
    ports: ["${FORGE_WEB_PORT}:${FORGE_WEB_PORT}"]
    environment:
      - FORGE_API_URL=${FORGE_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Compose ---
  compose-api:
    build: ./apps/compose/api
    ports: ["${COMPOSE_API_PORT}:${COMPOSE_API_PORT}"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_API_URL=${AUTH_API_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  compose-web:
    build: ./apps/compose/web
    ports: ["${COMPOSE_WEB_PORT}:${COMPOSE_WEB_PORT}"]
    environment:
      - COMPOSE_API_URL=${COMPOSE_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Pulse (Ambient Internal) ---
  pulse-api:
    build: ./apps/ambient/pulse
    ports: ["${PULSE_API_PORT}:${PULSE_API_PORT}"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_API_URL=${AUTH_API_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  pulse-web:
    build: ./apps/ambient/pulse/web
    ports: ["${PULSE_WEB_PORT}:${PULSE_WEB_PORT}"]
    environment:
      - PULSE_API_URL=${PULSE_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Bridge (Ambient External) ---
  bridge-api:
    build: ./apps/ambient/bridge
    ports: ["${BRIDGE_API_PORT}:${BRIDGE_API_PORT}"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_API_URL=${AUTH_API_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

  bridge-web:
    build: ./apps/ambient/bridge/web
    ports: ["${BRIDGE_WEB_PORT}:${BRIDGE_WEB_PORT}"]
    environment:
      - BRIDGE_API_URL=${BRIDGE_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}

  # --- Assistant (placeholder) ---
  assistant-api:
    build: ./apps/assistant/api
    ports: ["${ASSISTANT_API_PORT}:${ASSISTANT_API_PORT}"]
    profiles: ["full"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_API_URL=${AUTH_API_URL}

  assistant-web:
    build: ./apps/assistant/web
    ports: ["${ASSISTANT_WEB_PORT}:${ASSISTANT_WEB_PORT}"]
    profiles: ["full"]
    environment:
      - ASSISTANT_API_URL=${ASSISTANT_API_URL}
      - AUTH_API_URL=${AUTH_API_URL}

volumes:
  bitcoind-data:
  lnd-data:
  shared-data:
