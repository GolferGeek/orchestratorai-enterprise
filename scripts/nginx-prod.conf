# OrchestratorAI Gateway — localhost reverse proxy for Cloudflare Tunnel.
# Routes all traffic from a single domain to native Node.js dev servers on 6xxx ports.
# Enterprise (Mac Studio) = 6xxx, Diviner (Spark) = 7xxx.
# No Docker, no containers — just nginx + Node.js.
#
# Usage:
#   sudo nginx -c /path/to/this/file        # start
#   sudo nginx -c /path/to/this/file -s reload  # reload after changes
#   sudo nginx -c /path/to/this/file -s stop    # stop

worker_processes 1;
error_log /tmp/oai-nginx-error.log warn;
pid /tmp/oai-nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Use writable temp directories (default homebrew dirs may lack permissions)
    proxy_temp_path /tmp/oai-nginx-proxy-temp;
    client_body_temp_path /tmp/oai-nginx-client-temp;
    fastcgi_temp_path /tmp/oai-nginx-fastcgi-temp;
    uwsgi_temp_path /tmp/oai-nginx-uwsgi-temp;
    scgi_temp_path /tmp/oai-nginx-scgi-temp;

    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    access_log /tmp/oai-nginx-access.log;

    # ── Upstream definitions (localhost Node.js processes) ──────────────

    upstream command_web  { server 127.0.0.1:6102; }
    upstream admin_web    { server 127.0.0.1:6101; }
    upstream forge_web    { server 127.0.0.1:6201; }
    upstream compose_web  { server 127.0.0.1:6301; }
    upstream pulse_web    { server 127.0.0.1:6501; }
    upstream bridge_web   { server 127.0.0.1:6601; }

    upstream auth_api     { server 127.0.0.1:6100; }
    upstream admin_api    { server 127.0.0.1:6150; }
    upstream forge_api    { server 127.0.0.1:6200; }
    upstream compose_api  { server 127.0.0.1:6300; }
    upstream pulse_api    { server 127.0.0.1:6500; }
    upstream bridge_api   { server 127.0.0.1:6600; }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 6666;
        server_name _;

        # Shared proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── API routes (strip /api/<product>/ prefix) ────────────────────

        # Command web calls /auth/* directly (no /api/ prefix)
        location /auth/ {
            proxy_pass http://auth_api/auth/;
            proxy_http_version 1.1;
        }

        location /api/auth/ {
            proxy_pass http://auth_api/;
            proxy_http_version 1.1;
        }

        # RBAC endpoints (served by auth-api)
        location /api/rbac/ {
            proxy_pass http://auth_api/api/rbac/;
            proxy_http_version 1.1;
        }

        # Admin API health check (at /health, not /admin/health)
        location = /api/admin/health {
            proxy_pass http://admin_api/health;
            proxy_http_version 1.1;
        }

        # Admin API routes have /admin/ prefix in controllers
        location /api/admin/ {
            proxy_pass http://admin_api/admin/;
            proxy_http_version 1.1;
        }

        # Auth passthrough — catches /api/<product>/auth/* before the product routes
        # Products send auth calls (login, refresh, me) to their own base URL
        location ~ ^/api/(?:forge|compose|pulse|bridge)/auth/ {
            rewrite ^/api/[^/]+/(.*)$ /$1 break;
            proxy_pass http://auth_api;
            proxy_http_version 1.1;
        }

        location /api/forge/ {
            proxy_pass http://forge_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/compose/ {
            proxy_pass http://compose_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/pulse/ {
            proxy_pass http://pulse_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/bridge/ {
            proxy_pass http://bridge_api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Supabase storage proxy (media assets) ────────────────────────
        location /storage/ {
            proxy_pass http://127.0.0.1:54321/storage/;
            proxy_http_version 1.1;
        }
        location /assets/storage/ {
            proxy_pass http://127.0.0.1:54321/storage/v1/object/public/;
            proxy_http_version 1.1;
        }

        # ── Catch-all API paths (SPAs using relative URLs) ───────────────
        location /invoke/ {
            proxy_pass http://compose_api/invoke/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
        }

        location /agents {
            proxy_pass http://compose_api/agents;
            proxy_http_version 1.1;
        }

        location /conversations {
            proxy_pass http://compose_api/conversations;
            proxy_http_version 1.1;
        }

        location /runners {
            proxy_pass http://compose_api/runners;
            proxy_http_version 1.1;
        }

        location /health {
            proxy_pass http://auth_api/health;
            proxy_http_version 1.1;
        }

        # ── Web routes ───────────────────────────────────────────────────
        # Vite dev servers run with VITE_BASE_URL set, so they serve under
        # the path prefix already. We proxy the full path through (no strip).
        # WebSocket upgrade is needed for Vite HMR.

        location /admin/ {
            proxy_pass http://admin_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /forge/ {
            proxy_pass http://forge_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /compose/ {
            proxy_pass http://compose_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /pulse/ {
            proxy_pass http://pulse_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        location /bridge/ {
            proxy_pass http://bridge_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Default: Command (landing page + nav shell at /) ─────────────
        location / {
            proxy_pass http://command_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }
}
