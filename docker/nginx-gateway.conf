# OrchestratorAI Gateway — single-origin reverse proxy for Cloudflare Tunnel.
# All products behind one domain, path-routed. No ports exposed to the internet.

upstream command_web  { server command-web:80; }
upstream admin_web    { server admin-web:80; }
upstream forge_web    { server forge-web:80; }
upstream compose_web  { server compose-web:80; }
upstream pulse_web    { server pulse-web:80; }
upstream bridge_web   { server bridge-web:80; }

upstream auth_api     { server auth-api:${AUTH_API_PORT}; }
upstream admin_api    { server admin-api:${ADMIN_API_PORT}; }
upstream forge_api    { server forge-api:${FORGE_API_PORT}; }
upstream compose_api  { server compose-api:${COMPOSE_API_PORT}; }
upstream pulse_api    { server pulse-api:${PULSE_API_PORT}; }
upstream bridge_api   { server bridge-api:${BRIDGE_API_PORT}; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Shared proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API routes (strip /api/<product>/ prefix) ────────────────────────

    # Command web calls /auth/* directly (no /api/ prefix)
    location /auth/ {
        proxy_pass http://auth_api/auth/;
        proxy_http_version 1.1;
    }

    location /api/auth/ {
        proxy_pass http://auth_api/;
        proxy_http_version 1.1;
    }

    # RBAC endpoints (served by auth-api)
    location /api/rbac/ {
        proxy_pass http://auth_api/api/rbac/;
        proxy_http_version 1.1;
    }

    # Admin API health check (at /health, not /admin/health)
    location = /api/admin/health {
        proxy_pass http://admin_api/health;
        proxy_http_version 1.1;
    }

    # Admin API routes have /admin/ prefix in controllers (e.g. /admin/llm/usage)
    # Strip only /api/ so admin-api receives /admin/llm/usage
    location /api/admin/ {
        proxy_pass http://admin_api/admin/;
        proxy_http_version 1.1;
    }

    location /api/forge/ {
        proxy_pass http://forge_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/compose/ {
        proxy_pass http://compose_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/pulse/ {
        proxy_pass http://pulse_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/bridge/ {
        proxy_pass http://bridge_api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Supabase storage proxy (media assets) ───────────────────────────
    # Direct storage access (legacy URLs from Supabase getPublicUrl)
    location /storage/ {
        proxy_pass http://host.docker.internal:6010/storage/;
        proxy_http_version 1.1;
    }
    # API-proxied storage URLs (generated when PUBLIC_API_URL is set)
    location /assets/storage/ {
        proxy_pass http://host.docker.internal:6010/storage/v1/object/public/;
        proxy_http_version 1.1;
    }

    # ── Catch-all API paths used by SPAs with relative URLs ─────────────
    # These handle cases where product SPAs make API calls without the
    # /api/<product>/ prefix (e.g., Compose calling /invoke/providers-models).
    # Route to the most likely backend based on the path pattern.

    location /invoke/ {
        proxy_pass http://compose_api/invoke/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_cache off;
    }

    location /agents {
        proxy_pass http://compose_api/agents;
        proxy_http_version 1.1;
    }

    location /conversations {
        proxy_pass http://compose_api/conversations;
        proxy_http_version 1.1;
    }

    location /runners {
        proxy_pass http://compose_api/runners;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_pass http://auth_api/health;
        proxy_http_version 1.1;
    }

    # ── Web routes (prefix stripped by trailing slash in proxy_pass) ─────
    # Gateway strips /forge/ → inner NGINX sees /. Each SPA is built with
    # VITE_BASE_URL=/forge/ so asset refs and Vue Router base are correct.
    # Inner NGINX stays standard (nginx-spa.conf, serves from root).

    location /admin/ {
        proxy_pass http://admin_web/;
    }

    location /forge/ {
        proxy_pass http://forge_web/;
    }

    location /compose/ {
        proxy_pass http://compose_web/;
    }

    location /pulse/ {
        proxy_pass http://pulse_web/;
    }

    location /bridge/ {
        proxy_pass http://bridge_web/;
    }

    # ── Default: Command (landing page + nav shell at /) ─────────────────

    location / {
        proxy_pass http://command_web;
    }
}
